version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sitescope-backend
    restart: unless-stopped
    ports:
      # Bind to localhost only — never expose the backend directly to the internet
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/sitescope.db
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:80}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-10}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60}
      - IP_RATE_LIMIT_MAX=${IP_RATE_LIMIT_MAX:-30}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    read_only: false  # needs write for SQLite; mount /app/data as writable volume

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sitescope-frontend
    restart: unless-stopped
    ports:
      # Bind to localhost only — cloudflared connects here, not the open internet
      - "127.0.0.1:80:8080"
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sitescope-cloudflared
    restart: unless-stopped
    # Token-based tunnel: create at dash.cloudflare.com → Zero Trust → Networks → Tunnels
    # Set TUNNEL_TOKEN in your .env file
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      frontend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    network_mode: host  # needs host network to reach localhost:80

  # Local dev override: run frontend with Vite hot reload
  # Use `docker-compose --profile dev up` to start
  frontend-dev:
    image: node:20-alpine
    container_name: sitescope-frontend-dev
    profiles: ["dev"]
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  sitescope-data:
