<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Robot Body -->
  <rect x="35" y="45" width="130" height="120" rx="30" fill="#111111" stroke="#1e1e1e" stroke-width="3" />
  
  <!-- "Scopes" / Antennae -->
  <g transform="translate(65, 15)">
    <rect x="0" y="5" width="6" height="30" fill="#00ff88" rx="3" />
    <circle cx="3" cy="5" r="5" fill="#00ff88" filter="url(#glow)" />
  </g>
  <g transform="translate(129, 15)">
    <rect x="0" y="5" width="6" height="30" fill="#00ff88" rx="3" />
    <circle cx="3" cy="5" r="5" fill="#00ff88" filter="url(#glow)" />
  </g>

  <!-- Screen Area -->
  <rect x="50" y="60" width="100" height="80" rx="18" fill="#0a0a0a" stroke="#00ff88" stroke-width="1.5" opacity="0.8" />
  
  <!-- Terminal Prompt Face -->
  <g transform="translate(100, 110)" text-anchor="middle" filter="url(#glow)">
    <text font-family="monospace" font-size="48" fill="#00ff88" font-weight="bold">
      &gt;_
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite" />
    </text>
  </g>
  
  <!-- Scanning Light -->
  <rect x="55" y="65" width="90" height="1.5" fill="#00ff88" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 70" dur="2s" repeatCount="indefinite" />
  </rect>
</svg>
