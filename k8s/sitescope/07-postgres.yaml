---
apiVersion: v1
kind: Secret
metadata:
  name: sitescope-postgres-secret
  namespace: sitescope
type: Opaque
stringData:
  POSTGRES_PASSWORD: "sitescope_pg_2026"
  DATABASE_URL: "postgresql://sitescope:sitescope_pg_2026@sitescope-postgres:5432/sitescope"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sitescope-postgres-data
  namespace: sitescope
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sitescope-postgres
  namespace: sitescope
  labels:
    app: sitescope-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sitescope-postgres
  template:
    metadata:
      labels:
        app: sitescope-postgres
    spec:
      nodeSelector:
        kubernetes.io/hostname: node-02
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: sitescope
            - name: POSTGRES_USER
              value: sitescope
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sitescope-postgres-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "sitescope", "-d", "sitescope"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "sitescope", "-d", "sitescope"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sitescope-postgres-data

---
apiVersion: v1
kind: Service
metadata:
  name: sitescope-postgres
  namespace: sitescope
spec:
  type: ClusterIP
  selector:
    app: sitescope-postgres
  ports:
    - port: 5432
      targetPort: 5432
