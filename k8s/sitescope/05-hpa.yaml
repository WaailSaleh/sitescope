# HPA — scales pods automatically under load
# Requires metrics-server: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
# k3s ships metrics-server by default
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sitescope-backend
  namespace: sitescope
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sitescope-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sitescope-frontend
  namespace: sitescope
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sitescope-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
