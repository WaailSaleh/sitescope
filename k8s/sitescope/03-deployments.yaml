# EDIT REQUIRED:
#   - image: ghcr.io/${GITHUB_OWNER}/sitescope-backend:${IMAGE_TAG}
#   - image: ghcr.io/${GITHUB_OWNER}/sitescope-frontend:${IMAGE_TAG}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sitescope-backend
  namespace: sitescope
  labels:
    app: sitescope-backend
    version: latest
spec:
  replicas: 2
  # Rolling update — zero downtime deploys
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sitescope-backend
  template:
    metadata:
      labels:
        app: sitescope-backend
    spec:
      nodeSelector:
        kubernetes.io/hostname: node-02
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: backend
          # GitHub Actions updates this tag on every push to main
          image: ghcr.io/${GITHUB_OWNER}/sitescope-backend:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: sitescope-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sitescope-data

---
apiVersion: v1
kind: Service
metadata:
  name: sitescope-backend
  namespace: sitescope
spec:
  type: ClusterIP
  selector:
    app: sitescope-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sitescope-frontend
  namespace: sitescope
  labels:
    app: sitescope-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sitescope-frontend
  template:
    metadata:
      labels:
        app: sitescope-frontend
    spec:
      nodeSelector:
        kubernetes.io/hostname: node-02
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: frontend
          image: ghcr.io/${GITHUB_OWNER}/sitescope-frontend:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: sitescope-frontend
  namespace: sitescope
spec:
  type: ClusterIP
  selector:
    app: sitescope-frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
