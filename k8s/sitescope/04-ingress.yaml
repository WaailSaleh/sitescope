---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sitescope
  namespace: sitescope
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: ${SUBDOMAIN}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: sitescope-backend
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: sitescope-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sitescope-frontend
                port:
                  number: 80
