---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sitescope-backend
  namespace: sitescope
  labels:
    app: sitescope-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sitescope-backend
  template:
    metadata:
      labels:
        app: sitescope-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: sitescope-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: sitescope-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "125m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # SQLite needs write access
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: sitescope-data
              mountPath: /app/data
      volumes:
        - name: sitescope-data
          persistentVolumeClaim:
            claimName: sitescope-data-pvc

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sitescope-frontend
  namespace: sitescope
  labels:
    app: sitescope-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sitescope-frontend
  template:
    metadata:
      labels:
        app: sitescope-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: frontend
          image: sitescope-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
