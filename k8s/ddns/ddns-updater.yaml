---
apiVersion: v1
kind: Namespace
metadata:
  name: ddns

---
apiVersion: v1
kind: Secret
metadata:
  name: ddns-cloudflare-token
  namespace: ddns
type: Opaque
stringData:
  api-token: "${CF_API_TOKEN}"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ddns-config
  namespace: ddns
data:
  CLOUDFLARE_ZONE_ID: "${CF_ZONE_ID}"
  CLOUDFLARE_RECORD_ID: "${CF_RECORD_ID}"
  CLOUDFLARE_WILDCARD_RECORD_ID: "${CF_WILDCARD_RECORD_ID}"
  CLOUDFLARE_RECORD_NAME: "${CF_RECORD_NAME}"

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ddns-updater
  namespace: ddns
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: ddns
              image: alpine:3.19
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  apk add --no-cache curl jq -q
                  CURRENT_IP=$(curl -sf https://api.ipify.org)
                  echo "Current IP: $CURRENT_IP"
                  CF_IP=$(curl -sf \
                    "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records/${CLOUDFLARE_RECORD_ID}" \
                    -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | jq -r '.result.content')
                  echo "Cloudflare IP: $CF_IP"
                  if [ "$CURRENT_IP" = "$CF_IP" ]; then
                    echo "IP unchanged, skipping update."; exit 0
                  fi
                  echo "Updating root A record: $CF_IP -> $CURRENT_IP"
                  curl -sf -X PUT \
                    "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records/${CLOUDFLARE_RECORD_ID}" \
                    -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                    -H "Content-Type: application/json" \
                    --data "{\"type\":\"A\",\"name\":\"${CLOUDFLARE_RECORD_NAME}\",\"content\":\"${CURRENT_IP}\",\"ttl\":60,\"proxied\":true}" \
                    | jq -r 'if .success then "Root updated OK" else "Root FAILED: \(.errors)" end'
                  echo "Updating wildcard A record: $CF_IP -> $CURRENT_IP"
                  curl -sf -X PUT \
                    "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records/${CLOUDFLARE_WILDCARD_RECORD_ID}" \
                    -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                    -H "Content-Type: application/json" \
                    --data "{\"type\":\"A\",\"name\":\"*.${CLOUDFLARE_RECORD_NAME}\",\"content\":\"${CURRENT_IP}\",\"ttl\":60,\"proxied\":true}" \
                    | jq -r 'if .success then "Wildcard updated OK" else "Wildcard FAILED: \(.errors)" end'
              envFrom:
                - configMapRef:
                    name: ddns-config
              env:
                - name: CLOUDFLARE_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: ddns-cloudflare-token
                      key: api-token
              resources:
                requests: { cpu: 10m, memory: 16Mi }
                limits:   { cpu: 100m, memory: 32Mi }
