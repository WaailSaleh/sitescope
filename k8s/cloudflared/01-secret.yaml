---
# DO NOT commit a real token here.
# Create this secret imperatively on the cluster:
#
#   kubectl create secret generic tunnel-token \
#     --from-literal=token=YOUR_TUNNEL_TOKEN \
#     --namespace cloudflared
#
# This file is a reference template only.
apiVersion: v1
kind: Secret
metadata:
  name: tunnel-token
  namespace: cloudflared
type: Opaque
stringData:
  token: "REPLACE_WITH_TUNNEL_TOKEN"
